# ========================================================
# DNS 解析系统 -部分由 Openclash 配置接管
# ========================================================
dns:
  # enable: true
  # listen: 0.0.0.0:7874
  # ipv6: true
  # use-hosts: false
  # use-system-hosts: false
  # enhanced-mode: fake-ip
  # respect-rules: false
  # fake-ip-range: 198.18.0.1/16
  # fake-ip-filter-mode: blacklist
  fake-ip-filter:
    # NTP 时间同步
    - '+.ntp.org.cn'
    - '+.pool.ntp.org'
    - 'time.*.com'
    - 'time.*.gov'
    - 'time.*.edu.cn'
    - 'time.windows.com'
    # 局域网
    - '+.lan'
    - '+.local'
    - '+.localdomain'
    - '+.example'
    - '+.invalid'
    - '+.localhost'
    - '+.test'
    - '*.home.arpa'
    - '*.direct'
    - '+.arpa'
    - 'workgroup'
    # 网络探测与公共 Wi-Fi 认证门户
    - '+.msftconnecttest.com'
    - '+.msftncsi.com'
    - 'detectportal.firefox.com'
    - 'network-test.debian.org'
    - 'captive.apple.com'
    - 'connectivitycheck.gstatic.com'
    - 'clients3.google.com'
    - 'nmcheck.gnome.org'
    - 'httpbin.org'
    - 'auth.wiwide.com'
    # 国内运营商与网银“本机一键登录”
    - '*.cmpassport.com'       # 中国移动
    - 'open.e.189.cn'          # 中国电信
    - 'id.mail.wo.cn'          # 中国联通
    - '*.cmbchina.com'         # 招商银行
    # P2P 直连 / STUN 服务
    - 'stun.*.*'
    - 'stun.*.*.*'
    - '+.stun.*.*'
    - '+.stun.*'
    - '+.ts.net'               # Tailscale
    - "+.tailscale.com"
    - "+.tailscale.io"
    - '+.zerotier.com'         # Zerotier
    - 'global.turn.twilio.com' # Twilio
    - 'stun.l.google.com'      # Google STUN
    - '*.mcdn.bilivideo.cn'    # Bilibili 边缘 P2P 缓冲节点
    - 'relay.metered.ca'
    # 智能家居、投屏与局域网发现 (防内网设备失联)
    - '+.miwifi.com'           # 小米/红米路由器管理
    - 'router.asus.com'        # 华硕路由器管理
    - 'tplogin.cn'             # TP-Link 路由器管理
    - '+.plex.direct'          # Plex 流媒体内网穿透直连
    - '+.io.mi.com'            # 米家局域网云发现
    - '+.syncthing.net'        # Syncthing
    - 'instant.arubanetworks.com' #  Aruba 组网
    # Steam 下载与内容分发服务器
    - '+.cm.steampowered.com'
    - '+.steamcontent.com'
    - '+.steamserver.net'
    # 微软服务 (商店/OneDrive等)
    - '+.onedrive.live.com'
    - 'xbox.*.microsoft.com'
    - '+.xboxlive.com'         # Xbox 联机
    - 'storeedge.microsoft.com'
    # 苹果服务 (主要为 Apple Music 及部分内容分发)
    - '+.music.apple.com'
    - '+.itunes.apple.com'
    - 'mvod.itunes.apple.com'
    - '+.aaplimg.com'
    # 游戏联机
    - '+.srv.nintendo.net'     # 任天堂 NS 联机
    - '+.wargaming.net'        # Wargaming 游戏
    - 'stun.playstation.net'
    # 镜像站点
    - '+.mirror.tuna.tsinghua.edu.cn'
    - '+.mirrors.ustc.edu.cn'
    - '+.1ms.run'
    # PT / BT Trackers
    - "*.*.tracker.*"
    - "tracker.*"
    - "*.tracker.*"
    - "announce.*"
    - "torrent.*"
    # 自建站点
    - '+.elix1r.top'
    - '+.acc3l.top'

  # 默认 DNS (用于解析下方的 DoH 域名)
  default-nameserver:
    - 223.5.5.5
    - 119.29.29.29

  # 兜底 DNS：国外域名走此解析 (使用纯 IP 格式防污染)
  nameserver:
    - https://8.8.8.8/dns-query               # Google DoH
    - https://dns.google/dns-query
    - https://1.1.1.1/dns-query               # Cloudflare DoH
    - https://dns.cloudflare.com/dns-query
    - https://dns.quad9.net/dns-query         # Quad9 DoH

  # 代理节点本身的 DNS 优先走国内直连解析
  proxy-server-nameserver:
    - https://223.5.5.5/dns-query

  # 精准 DNS 分流策略 (国内域名及特定大厂走阿里 DoH)
  nameserver-policy:
    "+.ts.net": "100.100.100.100"              # 针对 Tailscale MagicDNS 功能的 DNS 预分流的核心配置
    "geosite:cn,apple,microsoft,steam@cn":
      - https://223.5.5.5/dns-query
      - https://223.6.6.6/dns-query
    +.elix1r.top,+.acc3l.top,+.tailscale.com:                  # 自建域名
      - https://223.5.5.5/dns-query
      - https://223.6.6.6/dns-query
    "geosite:geolocation-!cn":
      - https://8.8.8.8/dns-query
      - https://1.1.1.1/dns-query

# ========================================================
# 路由分流规则 (综合 geosite、geoip 与域名/IP)
# ========================================================
rules:
  # --- P2P 与 内网直连防御 (最高优先级) ---
  - PROCESS-NAME,tailscaled.exe,DIRECT
  - PROCESS-NAME,tailscale-ipn.exe,DIRECT
  - PROCESS-NAME,tailscaled,DIRECT
  - PROCESS-NAME,zerotier-one_x64,DIRECT
  - PROCESS-NAME,zerotier-one_x64.exe,DIRECT
  - IP-CIDR,100.64.0.0/10,DIRECT,no-resolve      # Tailscale
  - AND,((NETWORK,UDP),(DST-PORT,41641)),DIRECT  # Tailscale 客户端常用端口
  - DOMAIN,pkgs.tailscale.com,🚀 节点选择
  - DOMAIN-SUFFIX,tailscale.com,DIRECT
  - DOMAIN-SUFFIX,ts.net,DIRECT

  - SRC-IP-CIDR,192.168.31.11/32,DIRECT          # NAS 服务器本地 IP 直连

  - DOMAIN-SUFFIX,local,DIRECT
  - IP-CIDR,127.0.0.0/8,DIRECT,no-resolve
  - IP-CIDR,192.168.0.0/16,DIRECT,no-resolve
  - IP-CIDR,10.0.0.0/8,DIRECT,no-resolve
  - IP-CIDR,172.16.0.0/12,DIRECT,no-resolve
  - IP-CIDR6,fe80::/10,DIRECT,no-resolve
  - DST-PORT,6881-6889,DIRECT                    # BT 常用端口

  # --- 拦截目标端口为 443 的 UDP 流量 ---
  - AND,((NETWORK,UDP),(DST-PORT,443)),REJECT

  # --- 屏蔽广告与跟踪 ---
  - GEOSITE,category-ads-all,REJECT

  # --- AI 服务规则 ---
  - GEOSITE,category-ai-chat-!cn,🏗️ 自建 URLTest # 将海外 AI 服务定向到自建节点
  - GEOSITE,category-ai-cn,DIRECT # 国内 AI 服务走直连

  # --- 微软服务自定义分流 ---
  - DOMAIN,my.microsoftpersonalcontent.com,DIRECT
  - DOMAIN-SUFFIX,onedrive.com,DIRECT
  - DOMAIN,skyapi.live.net,DIRECT
  - DOMAIN,storage.live.com,DIRECT
  - DOMAIN-SUFFIX,sharepoint.com,DIRECT
  - DOMAIN,mobile.events.data.microsoft.com,DIRECT
  - DOMAIN,store-images.s-microsoft.com,DIRECT

  # --- Google 服务自定义分流 ---
  - DOMAIN-SUFFIX,accounts.google.com,🤖 AI 服务
  - DOMAIN-SUFFIX,gemini.google.com,🤖 AI 服务
  - DOMAIN-SUFFIX,play.google.com,🤖 AI 服务
  - DOMAIN-SUFFIX,aistudio.google.com,🤖 AI 服务
  - DOMAIN-SUFFIX,makersuite.google.com,🤖 AI 服务
  - DOMAIN-SUFFIX,mtalk.google.com,🤖 AI 服务
  - DOMAIN-SUFFIX,ai.google.dev,🤖 AI 服务
  - DOMAIN-SUFFIX,clients.google.com,🤖 AI 服务
  - DOMAIN-SUFFIX,clients4.google.com,🤖 AI 服务
  - DOMAIN-SUFFIX,clients6.google.com,🤖 AI 服务

  - DOMAIN-SUFFIX,generativelanguage.googleapis.com,🤖 AI 服务
  - DOMAIN-SUFFIX,geller-pa.googleapis.com,🤖 AI 服务
  - DOMAIN-SUFFIX,cloudcode-pa.googleapis.com,🤖 AI 服务
  - DOMAIN-SUFFIX,play.googleapis.com,🤖 AI 服务
  - DOMAIN-SUFFIX,clientservices.googleapis.com,🤖 AI 服务
  - DOMAIN-SUFFIX,oauth2.googleapis.com,🤖 AI 服务
  - DOMAIN-SUFFIX,www.googleapis.com,🤖 AI 服务

  - DOMAIN,lh3.googleusercontent.com,🤖 AI 服务
  - DOMAIN,antigravity-unleash.goog,🤖 AI 服务

  # --- IP 解析站分流 ---
  - DOMAIN-SUFFIX,whoer.net,🤖 AI 服务
  - DOMAIN-SUFFIX,browserscan.net,🤖 AI 服务
  - DOMAIN-SUFFIX,scamalytics.com,🤖 AI 服务

  # --- 镜像站自定义分流 ---
  - DOMAIN-SUFFIX,tuna.tsinghua.edu.cn,DIRECT
  - DOMAIN-SUFFIX,ustc.edu.cn,DIRECT
  - DOMAIN-SUFFIX,1ms.run,DIRECT
  - DOMAIN-SUFFIX,mirrors.aliyun.com,DIRECT
  - DOMAIN,registry.npmjs.org,DIRECT             # NPM 官方注册表

  # --- 其他自定义域名/IP 定向 ---
  - DOMAIN-SUFFIX,elix1r.top,DIRECT              # 自建站点
  - DOMAIN-SUFFIX,acc3l.top,DIRECT               # 自建站点

  # --- 常用流量直连规则 ---
  - GEOSITE,steam@cn,DIRECT                      # Steam 中国区及下载直连
  - GEOSITE,apple@cn,DIRECT                      # Apple 国内直连
  - GEOSITE,microsoft@cn,DIRECT                  # 微软 国内直连
  - GEOSITE,apple,DIRECT                         # Apple 全局偏好直连
  - GEOSITE,category-games@cn,DIRECT             # 国内游戏直连

  # --- 需代理的服务 ---
  - GEOSITE,steam,🚀 节点选择                    # Steam 社区与商店
  - GEOSITE,telegram,🚀 节点选择
  - GEOSITE,google,🚀 节点选择
  - GEOSITE,github,🚀 节点选择
  - GEOSITE,geolocation-!cn,🚀 节点选择          # 非中国区域名兜底走代理
  - GEOIP,telegram,🚀 节点选择                   # 拦截 Telegram IP

  # --- 国内直连规则 ---
  - GEOSITE,cn,DIRECT
  - GEOIP,CN,DIRECT                              # 国内 IP 兜底直连

  # --- 全局兜底 ---
  - MATCH,🚀 节点选择

# ========================================================
# 节点组策略 (自动正则匹配)
# 适用命名规则: 来源 国家/地区 编号 (例如: 追云加速 美国 01 / 自建 台湾 02)
# ========================================================
proxy-groups:
  # --- 1. 核心路由入口 ---
  - name: 🚀 节点选择
    type: select
    proxies:
      - ♻️ 自动匹配 URLTest
      - ✈️ 追云加速
      - ✈️ 追云加速 URLTest
      - 🏗️ 自建
      - 🏗️ 自建 URLTest
      - 🏡 二级代理
      - 🇭🇰 香港节点
      - 🇹🇼 台湾节点
      - 🇯🇵 日本节点
      - 🇺🇸 美国节点
      - 🇸🇬 新加坡节点
      - DIRECT

  # 全局延迟最低节点
  - name: ♻️ 自动匹配 URLTest
    type: url-test
    url: http://www.gstatic.com/generate_204
    interval: 300
    tolerance: 50
    include-all: true

  # --- 2. 来源分组 (此处以 "追云加速" 和 "自建" 举例，请根据实际名称修改 filter) ---
  - name: ✈️ 追云加速 URLTest
    type: url-test
    url: http://www.gstatic.com/generate_204
    interval: 300
    tolerance: 50
    include-all: true
    filter: '(?i)追云加速'

  - name: ✈️ 追云加速
    type: select
    include-all: true
    filter: '(?i)追云加速'

  - name: 🏗️ 自建 URLTest
    type: url-test
    url: http://www.gstatic.com/generate_204
    interval: 300
    tolerance: 50
    include-all: true
    filter: '(?i)自建'

  - name: 🏗️ 自建
    type: select
    include-all: true
    filter: '(?i)自建'

  - name:  🏡 二级代理
    type: select
    include-all: true
    filter: '(?i)二级代理'

  # --- 3. 地区分组 (组内自动选择最优) ---
  - name: 🇭🇰 香港节点
    type: url-test
    url: http://www.gstatic.com/generate_204
    interval: 300
    tolerance: 50
    include-all: true
    filter: '(?i)香港|HK|Hong Kong'

  - name: 🇹🇼 台湾节点
    type: url-test
    url: http://www.gstatic.com/generate_204
    interval: 300
    tolerance: 50
    include-all: true
    filter: '(?i)台湾|TW|Taiwan'

  - name: 🇯🇵 日本节点
    type: url-test
    url: http://www.gstatic.com/generate_204
    interval: 300
    tolerance: 50
    include-all: true
    filter: '(?i)日本|JP|Japan'

  - name: 🇺🇸 美国节点
    type: url-test
    url: http://www.gstatic.com/generate_204
    interval: 300
    tolerance: 50
    include-all: true
    filter: '(?i)美国|US|United States'

  - name: 🇸🇬 新加坡节点
    type: url-test
    url: http://www.gstatic.com/generate_204
    interval: 300
    tolerance: 50
    include-all: true
    filter: '(?i)新加坡|SG|Singapore'

